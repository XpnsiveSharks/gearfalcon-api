# Apache configuration for GearFalcon API

# Set DocumentRoot to public directory
DocumentRoot /var/www/html/public

# Enable .htaccess overrides for the entire public directory
<Directory /var/www/html/public>
    Options Indexes FollowSymLinks
    AllowOverride All
    Require all granted

    # Enable PHP processing
    <Files "*.php">
        SetHandler application/x-httpd-php
    </Files>
</Directory>

# Custom log files
ErrorLog ${APACHE_LOG_DIR}/gearfalcon_error.log
CustomLog ${APACHE_LOG_DIR}/gearfalcon_access.log combined

# Security headers
Header always set X-Content-Type-Options nosniff
Header always set X-Frame-Options DENY
Header always set X-XSS-Protection "1; mode=block"