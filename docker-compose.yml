  services:
    frontend:
      build:
        context: ../gearfalcon-frontend
        dockerfile: Dockerfile.dev
      ports:
        - "3000:3000"
      environment:
        - NODE_ENV=development
        - NEXT_PUBLIC_API_URL=http://backend:80
        - NEXT_TELEMETRY_DISABLED=1
      volumes:
        - ../gearfalcon-frontend:/app
        - /app/node_modules
        - /app/.next
      networks:
        - app-network
      depends_on:
        - backend

    backend:
      build:
        context: .
        dockerfile: Dockerfile
      ports:
        - "8080:80"
      environment:
        # Application
        - APP_ENV=development
        - APP_DEBUG=true

        # Database
        - DB_HOST=db
        - DB_PORT=3306
        - DB_DATABASE=gearfalcon_db_dev
        - DB_USERNAME=gearfalcon_user
        - DB_PASSWORD=gearfalcon_pass

        # JWT Configuration
        - JWT_SECRET=your-super-secret-access-key-at-least-32-characters-long
        - JWT_REFRESH_SECRET=your-super-secret-refresh-key-at-least-32-characters-long
        - JWT_TTL_SECONDS=900

        # Cookie Configuration for Docker
        - COOKIE_DOMAIN=

        # CORS Configuration
        - ALLOWED_ORIGIN=http://localhost:3000,http://frontend:3000,https://web.postman.co

      volumes:
        - .:/var/www/html
      networks:
        - app-network
      depends_on:
        - db

    db:
      image: mysql:8.0
      ports:
        - "3306:3306"
      environment:
        - MYSQL_ROOT_PASSWORD=password
        - MYSQL_DATABASE=gearfalcon_db_dev
        - MYSQL_USER=gearfalcon_user
        - MYSQL_PASSWORD=gearfalcon_pass
      volumes:
        - db_data:/var/lib/mysql
        # Auto-import database schema on first run
        - ./gearfalcon_db.sql:/docker-entrypoint-initdb.d/gearfalcon_db.sql:ro
      networks:
        - app-network

  networks:
    app-network:
      driver: bridge

  volumes:
    db_data:
