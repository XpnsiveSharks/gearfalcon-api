version: '3.8'

services:
  # Next.js Frontend
  frontend:
    build:
      context: ../gearfalcon-frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ../gearfalcon-frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://backend:80
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - gearfalcon-network
    labels:
      - "app=gearfalcon"
      - "service=frontend"
      - "environment=development"

  # PHP Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html/src:ro
      - ./public:/var/www/html/public:ro
      - ./debug:/var/www/html/debug:ro
      - ./.env.development:/var/www/html/.env:ro
    environment:
      - APP_ENV=development
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=gearfalcon_db_dev
      - DB_USERNAME=gearfalcon_user
      - DB_PASSWORD=KdZZnyXp/HtUSq6HNFbw0e516id1xDNCNDHdt1+Swb8=
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - gearfalcon-network
    labels:
      - "app=gearfalcon"
      - "service=backend"
      - "environment=development"

  # MySQL Database
  db:
    image: mysql:8.0
    # REMOVED: ports: - "3306:3306"  # Database no longer exposed to host
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
      MYSQL_DATABASE: gearfalcon_db_dev
      MYSQL_USER: gearfalcon_user
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_root_password
      - db_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./gearfalcon_db.sql:/docker-entrypoint-initdb.d/gearfalcon_db.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - gearfalcon-network
    labels:
      - "app=gearfalcon"
      - "service=database"
      - "environment=development"

secrets:
  db_root_password:
    file: ./secrets/db_root_password.txt
  db_password:
    file: ./secrets/db_password.txt

volumes:
  mysql_data:

networks:
  gearfalcon-network:
    driver: bridge
